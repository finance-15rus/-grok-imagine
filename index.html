<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Imagine</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">✧</span>
                <span class="logo-text">Grok Imagine</span>
            </div>
            <nav class="nav">
                <button class="nav-btn active" data-tab="create">Create</button>
                <button class="nav-btn" data-tab="gallery">Gallery</button>
                <button class="nav-btn" data-tab="history">History</button>
            </nav>
            <div class="header-right">
                <button class="btn-icon" id="settings-btn" title="Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <main class="main">
            <!-- CREATE TAB -->
            <section class="tab-content active" id="tab-create">
                <div class="create-layout">
                    <div class="prompt-section">
                        <div class="prompt-box">
                            <textarea id="prompt-input" placeholder="Describe your imagination..." rows="4"></textarea>
                            <div class="prompt-actions">
                                <button class="btn-magic" id="enhance-btn" title="Enhance prompt">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"></path>
                                    </svg>
                                    Enhance
                                </button>
                                <button class="btn-clear" id="clear-btn" title="Clear">Clear</button>
                            </div>
                        </div>

                        <div class="options-grid">
                            <div class="option-group">
                                <label>Mode</label>
                                <div class="toggle-group">
                                    <button class="toggle-btn active" data-mode="image">Image</button>
                                    <button class="toggle-btn" data-mode="video">Video</button>
                                </div>
                            </div>

                            <div class="option-group">
                                <label>Aspect Ratio</label>
                                <div class="selector-grid">
                                    <button class="selector-btn active" data-ratio="1:1">1:1</button>
                                    <button class="selector-btn" data-ratio="16:9">16:9</button>
                                    <button class="selector-btn" data-ratio="9:16">9:16</button>
                                    <button class="selector-btn" data-ratio="4:3">4:3</button>
                                    <button class="selector-btn" data-ratio="3:4">3:4</button>
                                    <button class="selector-btn" data-ratio="3:2">3:2</button>
                                </div>
                            </div>

                            <div class="option-group">
                                <label>Style</label>
                                <select id="style-select">
                                    <option value="auto">Auto</option>
                                    <option value="realistic">Photorealistic</option>
                                    <option value="anime">Anime</option>
                                    <option value="oil">Oil Painting</option>
                                    <option value="watercolor">Watercolor</option>
                                    <option value="digital">Digital Art</option>
                                    <option value="sketch">Pencil Sketch</option>
                                    <option value="3d">3D Render</option>
                                    <option value="ghibli">Studio Ghibli</option>
                                </select>
                            </div>

                            <div class="option-group">
                                <label>Quality</label>
                                <div class="toggle-group">
                                    <button class="toggle-btn active" data-quality="1k">1K</button>
                                    <button class="toggle-btn" data-quality="2k">2K</button>
                                </div>
                            </div>

                            <div class="option-group" id="batch-group">
                                <label>Batch Size</label>
                                <div class="number-input">
                                    <button class="num-btn minus">−</button>
                                    <input type="number" id="batch-size" value="1" min="1" max="10">
                                    <button class="num-btn plus">+</button>
                                </div>
                            </div>
                        </div>

                        <button class="btn-generate" id="generate-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                            </svg>
                            Generate
                        </button>
                    </div>

                    <div class="results-section">
                        <div class="results-grid" id="results-grid">
                            <div class="placeholder-card">
                                <div class="placeholder-icon">✧</div>
                                <p>Your generated images will appear here</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- GALLERY TAB -->
            <section class="tab-content" id="tab-gallery">
                <div class="gallery-header">
                    <h2>Community Gallery</h2>
                    <div class="gallery-filter">
                        <select id="gallery-filter">
                            <option value="popular">Popular</option>
                            <option value="recent">Recent</option>
                            <option value="following">Following</option>
                        </select>
                    </div>
                </div>
                <div class="gallery-grid" id="gallery-grid">
                    <div class="placeholder-card">
                        <div class="placeholder-icon">🖼</div>
                        <p>Connect to API to view gallery</p>
                    </div>
                </div>
            </section>

            <!-- HISTORY TAB -->
            <section class="tab-content" id="tab-history">
                <div class="history-header">
                    <h2>Generation History</h2>
                    <button class="btn-clear" id="clear-history">Clear All</button>
                </div>
                <div class="history-grid" id="history-grid"></div>
            </section>
        </main>

        <!-- SETTINGS MODAL -->
        <div class="modal" id="settings-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Settings</h3>
                    <button class="btn-close" id="close-settings">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="setting-item">
                        <label>API Key</label>
                        <input type="password" id="api-key" placeholder="xAI API Key">
                        <p class="setting-hint">Get your API key from <a href="https://x.ai" target="_blank">x.ai</a></p>
                    </div>
                    <div class="setting-item">
                        <label>Default Model</label>
                        <select id="default-model">
                            <option value="grok-imagine-image">Grok Imagine Image</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>Output Format</label>
                        <select id="output-format">
                            <option value="base64">Base64</option>
                            <option value="url">URL</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>AI Provider</label>
                        <select id="ai-provider">
                            <option value="huggingface">Hyperbolic (Free Tier)</option>
                            <option value="replicate">Replicate</option>
                            <option value="xai">xAI (Paid)</option>
                        </select>
                    </div>
                    <div class="setting-item" id="hyperbolic-info">
                        <label>Free API</label>
                        <p class="setting-hint">Get free API key at <a href="https://hyperbolic.xyz" target="_blank">hyperbolic.xyz</a> — 1000 credits/month free</p>
                    </div>
                    <div class="setting-item" id="replicate-info" style="display: none;">
                        <label>Replicate API</label>
                        <p class="setting-hint">Get API key at <a href="https://replicate.com" target="_blank">replicate.com</a></p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-primary" id="save-settings">Save</button>
                </div>
            </div>
        </div>

        <!-- LIGHTBOX -->
        <div class="lightbox" id="lightbox">
            <button class="lightbox-close" id="lightbox-close">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="lightbox-content">
                <img id="lightbox-img" src="" alt="">
            </div>
            <div class="lightbox-actions">
                <button class="lightbox-btn" id="download-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Download
                </button>
                <button class="lightbox-btn" id="variations-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    Variations
                </button>
                <button class="lightbox-btn" id="remix-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 1l4 4-4 4"></path>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                        <path d="M7 23l-4-4 4-4"></path>
                        <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                    </svg>
                    Remix
                </button>
            </div>
        </div>

        <!-- TOAST NOTIFICATIONS -->
        <div class="toast-container" id="toast-container"></div>

        <!-- LOADING OVERLAY -->
        <div class="loading-overlay" id="loading-overlay">
            <div class="loading-spinner"></div>
            <p id="loading-text">Generating...</p>
            <div class="loading-progress">
                <div class="loading-bar" id="loading-bar"></div>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
